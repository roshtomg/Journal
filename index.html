<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ten Year Journal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Journal">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { background: #1a1a1a; }

        body {
            font-family: Georgia, serif;
            background: #f5f0e8;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Nav bar ── */
        nav {
            background: #1a1a1a;
            color: #f5f0e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: calc(0.75rem + env(safe-area-inset-top));
            padding-bottom: 0.75rem;
            padding-left: calc(1.5rem + env(safe-area-inset-left));
            padding-right: calc(1.5rem + env(safe-area-inset-right));
        }

        nav .title {
            font-size: 1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            font-weight: normal;
        }

        nav .today-btn {
            font-family: Arial, sans-serif;
            font-size: 0.78rem;
            padding: 0.3rem 0.8rem;
            background: transparent;
            color: #f5f0e8;
            border: 1px solid rgba(245,240,232,0.4);
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        nav .today-btn:hover { background: rgba(245,240,232,0.1); }

        /* ── Page ── */
        .page {
            max-width: 680px;
            width: 100%;
            margin: 2.5rem auto;
            background: #fffdf8;
            border: 1px solid #d8d0c0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08), 2px 2px 0 #e8e0d0;
            padding: 0;
            flex: 1;
        }

        /* ── Page header ── */
        .page-header {
            border-bottom: 2px solid #1a1a1a;
            padding: 1.8rem 2.5rem 1.4rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .page-header .day-of-year {
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            color: #999;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        .page-header .month-day {
            font-size: 2.2rem;
            font-weight: normal;
            letter-spacing: -0.01em;
            line-height: 1;
        }

        .page-header .weekday {
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.3rem;
            letter-spacing: 0.05em;
        }

        .page-nav {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .page-nav button {
            width: 36px;
            height: 36px;
            background: transparent;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 1rem;
            cursor: pointer;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-nav button:hover { background: #f0ece4; border-color: #999; }

        /* ── Year rows ── */
        .year-rows {
            padding: 0 2.5rem;
        }

        .year-row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid #e0d8cc;
            padding: 1.1rem 0;
            gap: 1.2rem;
        }

        .year-row:last-child {
            border-bottom: none;
        }

        .year-label {
            font-family: Arial, sans-serif;
            font-size: 0.82rem;
            font-weight: bold;
            color: #aaa;
            letter-spacing: 0.05em;
            width: 2.8rem;
            flex-shrink: 0;
            padding-top: 0.15rem;
            user-select: none;
        }

        .year-row.current-year .year-label {
            color: #1a1a1a;
        }

        .year-entry {
            flex: 1;
            position: relative;
        }

        .year-entry textarea {
            width: 100%;
            font-family: Georgia, serif;
            font-size: 1rem;
            line-height: 1.55;
            border: none;
            outline: none;
            background: transparent;
            resize: none;
            color: #1a1a1a;
            overflow: hidden;
            /* single line by default, grows with content */
            height: 1.55em;
            min-height: 1.55em;
            display: block;
        }

        .year-entry textarea::placeholder {
            color: #ccc;
            font-style: italic;
        }

        .year-row:not(.current-year) .year-entry textarea {
            color: #555;
        }

        /* saved flash */
        .save-indicator {
            position: absolute;
            right: 0;
            top: 0;
            font-family: Arial, sans-serif;
            font-size: 0.7rem;
            color: #aaa;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .save-indicator.show { opacity: 1; }

        /* ── Page footer ── */
        .page-footer {
            border-top: 1px solid #e0d8cc;
            padding: 0.8rem 2.5rem;
            font-family: Arial, sans-serif;
            font-size: 0.72rem;
            color: #bbb;
            display: flex;
            justify-content: space-between;
        }

        /* ── Responsive ── */
        @media (max-width: 720px) {
            .page {
                margin: 0;
                border-left: none;
                border-right: none;
                box-shadow: none;
            }
            .page-header, .year-rows, .page-footer {
                padding-left: max(1.2rem, env(safe-area-inset-left));
                padding-right: max(1.2rem, env(safe-area-inset-right));
            }
        }

        /* ── Search overlay ── */
        .search-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,26,26,0.92);
            z-index: 100;
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        .search-overlay.open { display: block; }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .search-input {
            flex: 1;
            font-family: Georgia, serif;
            font-size: 1rem;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 2px;
            background: #fffdf8;
            color: #1a1a1a;
            outline: none;
        }

        .search-close {
            font-family: Arial, sans-serif;
            font-size: 0.78rem;
            padding: 0.3rem 0.8rem;
            background: transparent;
            color: #f5f0e8;
            border: 1px solid rgba(245,240,232,0.4);
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .search-close:hover { background: rgba(245,240,232,0.1); }

        .search-results {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .search-result {
            background: #fffdf8;
            border-radius: 2px;
            padding: 0.9rem 1.1rem;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .search-result:hover { border-left-color: #1a1a1a; }

        .search-result-date {
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            color: #888;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        .search-result-text {
            font-family: Georgia, serif;
            font-size: 0.95rem;
            color: #1a1a1a;
            line-height: 1.5;
        }

        .search-result-text mark {
            background: #f5e68a;
            color: #1a1a1a;
            border-radius: 1px;
            padding: 0 1px;
        }

        .search-empty {
            color: #aaa;
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 2rem;
        }

        /* ── Auth overlay ── */
        .auth-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #f5f0e8;
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .auth-overlay.open { display: flex; }

        .auth-box {
            max-width: 360px;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }

        .auth-title {
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #1a1a1a;
            margin-bottom: 2rem;
        }

        .auth-input {
            width: 100%;
            font-family: Georgia, serif;
            font-size: 1rem;
            padding: 0.65rem 1rem;
            border: 1px solid #d8d0c0;
            border-radius: 2px;
            background: #fffdf8;
            color: #1a1a1a;
            outline: none;
            margin-bottom: 0.75rem;
        }

        .auth-input:focus { border-color: #1a1a1a; }

        .auth-btn {
            width: 100%;
            font-family: Arial, sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.65rem 1rem;
            background: #1a1a1a;
            color: #f5f0e8;
            border: none;
            border-radius: 2px;
            cursor: pointer;
        }

        .auth-btn:hover { background: #333; }

        .auth-msg {
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            color: #888;
            margin-top: 1rem;
            min-height: 1.2em;
        }

        .auth-google-btn {
            width: 100%;
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            padding: 0.65rem 1rem;
            background: #fffdf8;
            color: #1a1a1a;
            border: 1px solid #d8d0c0;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .auth-google-btn:hover { background: #f0ece4; }

        /* ── Nav user info ── */
        .nav-user {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(245,240,232,0.2);
            display: none;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-size: 0.65rem;
            color: #f5f0e8;
            flex-shrink: 0;
        }

        .nav-user.visible { display: flex; }
    </style>
</head>
<body>

<nav>
    <span class="title">Ten Year Journal</span>
    <div style="display:flex;align-items:center;gap:0.5rem">
        <span class="nav-user" id="navUser"></span>
        <button class="today-btn" onclick="openSearch()">Search</button>
        <button class="today-btn" onclick="goToToday()">Today</button>
        <button class="today-btn" id="signOutBtn" onclick="signOut()" style="display:none">Sign Out</button>
    </div>
</nav>

<div class="auth-overlay" id="authOverlay">
    <div class="auth-box">
        <div class="auth-title">Ten Year Journal</div>
        <button class="auth-google-btn" onclick="signInWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>
        <div class="auth-msg" id="authMsg"></div>
    </div>
</div>

<div class="search-overlay" id="searchOverlay">
    <div class="search-box">
        <div class="search-input-row">
            <input class="search-input" id="searchInput" type="search" placeholder="Search your entries…" oninput="doSearch()">
            <button class="search-close" onclick="closeSearch()">Close</button>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>
</div>

<div class="page">
    <div class="page-header">
        <div>
            <div class="day-of-year" id="dayOfYear"></div>
            <div class="month-day" id="monthDay"></div>
            <div class="weekday" id="weekday"></div>
        </div>
        <div class="page-nav">
            <button onclick="navigate(-1)" title="Previous day">&#8592;</button>
            <button onclick="navigate(1)" title="Next day">&#8594;</button>
        </div>
    </div>

    <div class="year-rows" id="yearRows"></div>

    <div class="page-footer">
        <span>Entries save automatically</span>
        <span id="footerFill"></span>
    </div>
</div>

<script>
    // ── Supabase ──
    const SUPABASE_URL = 'https://iuzsisanrlfbutdtwlqh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bLLqxn3HvgKym0azcX4fVw_9U_l7pNQ';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    async function initAuth() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            await onLogin(session.user);
        } else {
            document.getElementById('authOverlay').classList.add('open');
        }
        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' && session) await onLogin(session.user);
            if (event === 'SIGNED_OUT') {
                currentUser = null;
                document.getElementById('authOverlay').classList.add('open');
                document.getElementById('navUser').classList.remove('visible');
                document.getElementById('signOutBtn').style.display = 'none';
            }
        });
    }

    async function onLogin(user) {
        currentUser = user;
        document.getElementById('authOverlay').classList.remove('open');
        const navUser = document.getElementById('navUser');
        navUser.textContent = user.email[0].toUpperCase();
        navUser.classList.add('visible');
        document.getElementById('signOutBtn').style.display = '';
        await syncFromSupabase();
        render();
    }

    async function signInWithGoogle() {
        const msg = document.getElementById('authMsg');
        msg.textContent = 'Redirecting…';
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.href }
        });
        if (error) msg.textContent = error.message;
    }

    async function signOut() {
        await sb.auth.signOut();
    }

    async function syncFromSupabase() {
        if (!currentUser) return;
        const { data, error } = await sb.from('entries').select('*');
        if (error || !data) return;
        const local = getData();
        for (const row of data) {
            const key = `${row.month}-${row.day}`;
            if (!local[key]) local[key] = {};
            local[key][row.year] = row.text;
        }
        setData(local);
    }

    async function syncEntryToSupabase(year, month, day, text) {
        if (!currentUser) return;
        await sb.from('entries').upsert(
            { user_id: currentUser.id, year, month, day, text, updated_at: new Date().toISOString() },
            { onConflict: 'user_id,month,day,year' }
        );
    }

    const STORAGE_KEY = 'fiveYearJournal';
    const YEARS = 10;

    // currentDate is the M/D being viewed (month 0-indexed, day 1-indexed)
    // We store just month+day so it's year-agnostic navigation
    let viewMonth, viewDay;

    function getData() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
        catch { return {}; }
    }

    function setData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getEntry(year, month, day) {
        const data = getData();
        const key = `${month}-${day}`;
        return (data[key] && data[key][year]) || '';
    }

    function setEntry(year, month, day, text) {
        const data = getData();
        const key = `${month}-${day}`;
        if (!data[key]) data[key] = {};
        data[key][year] = text;
        setData(data);
        syncEntryToSupabase(year, month, day, text);
    }

    function startYear() {
        // 10 years starting from the current year
        return new Date().getFullYear();
    }

    function currentYear() {
        return new Date().getFullYear();
    }

    function dayOfYear(month, day) {
        // month is 0-indexed
        const d = new Date(2024, month, day); // 2024 = leap year, safe for Feb 29
        const start = new Date(2024, 0, 1);
        return Math.round((d - start) / 86400000) + 1;
    }

    function monthName(month) {
        return new Date(2000, month, 1).toLocaleString('en-US', { month: 'long' });
    }

    function weekdayForDate(month, day) {
        // Use current year for weekday (changes each year, just show current)
        const year = currentYear();
        return new Date(year, month, day).toLocaleString('en-US', { weekday: 'long' });
    }

    function autoResize(ta) {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
    }

    function render() {
        // Header
        document.getElementById('dayOfYear').textContent =
            `Day ${dayOfYear(viewMonth, viewDay)}`;
        document.getElementById('monthDay').textContent =
            `${monthName(viewMonth)} ${viewDay}`;
        document.getElementById('weekday').textContent =
            weekdayForDate(viewMonth, viewDay);

        // Year rows
        const container = document.getElementById('yearRows');
        container.innerHTML = '';

        const base = startYear();
        const thisYear = currentYear();
        let filled = 0, total = 0;

        for (let i = 0; i < YEARS; i++) {
            const year = base + i;
            const text = getEntry(year, viewMonth, viewDay);
            if (text.trim()) filled++;
            total++;

            const isCurrent = year === thisYear;

            const row = document.createElement('div');
            row.className = 'year-row' + (isCurrent ? ' current-year' : '');

            const label = document.createElement('div');
            label.className = 'year-label';
            label.textContent = year;

            const entryDiv = document.createElement('div');
            entryDiv.className = 'year-entry';

            const ta = document.createElement('textarea');
            ta.rows = 1;
            ta.value = text;
            ta.placeholder = isCurrent ? 'Write your line for today…' : '';
            // Past/future years are editable but dimmed
            ta.dataset.year = year;

            const indicator = document.createElement('span');
            indicator.className = 'save-indicator';
            indicator.textContent = 'saved';

            let saveTimer;
            ta.addEventListener('input', () => {
                autoResize(ta);
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => {
                    setEntry(year, viewMonth, viewDay, ta.value);
                    indicator.classList.add('show');
                    setTimeout(() => indicator.classList.remove('show'), 1200);
                    updateFooter();
                }, 400);
            });

            // Resize on load
            setTimeout(() => autoResize(ta), 0);

            entryDiv.appendChild(ta);
            entryDiv.appendChild(indicator);
            row.appendChild(label);
            row.appendChild(entryDiv);
            container.appendChild(row);
        }

        updateFooter();

        // Focus current year's textarea
        const textareas = container.querySelectorAll('textarea');
        const currentIdx = currentYear() - base;
        if (currentIdx >= 0 && currentIdx < textareas.length) {
            // Only auto-focus if it's today's date
            const today = new Date();
            if (viewMonth === today.getMonth() && viewDay === today.getDate()) {
                textareas[currentIdx].focus();
                const len = textareas[currentIdx].value.length;
                textareas[currentIdx].setSelectionRange(len, len);
            }
        }
    }

    function updateFooter() {
        const base = startYear();
        let filled = 0;
        for (let i = 0; i < YEARS; i++) {
            if (getEntry(base + i, viewMonth, viewDay).trim()) filled++;
        }
        document.getElementById('footerFill').textContent =
            filled === 0 ? '' : `${filled} of ${YEARS} years filled`;
    }

    function navigate(delta) {
        // Move by delta days
        // Use a non-leap reference year except for Feb 29
        const d = new Date(2024, viewMonth, viewDay);
        d.setDate(d.getDate() + delta);
        viewMonth = d.getMonth();
        viewDay = d.getDate();
        render();
        window.scrollTo(0, 0);
    }

    function goToToday() {
        const today = new Date();
        viewMonth = today.getMonth();
        viewDay = today.getDate();
        render();
    }

    // ── Search ──
    function openSearch() {
        document.getElementById('searchOverlay').classList.add('open');
        document.getElementById('searchInput').focus();
    }

    function closeSearch() {
        document.getElementById('searchOverlay').classList.remove('open');
    }

    function doSearch() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const resultsEl = document.getElementById('searchResults');
        resultsEl.innerHTML = '';
        if (!query) return;

        const data = getData();
        const matches = [];

        for (const key in data) {
            const parts = key.split('-');
            const month = parseInt(parts[0]);
            const day = parseInt(parts[1]);
            const yearEntries = data[key];
            for (const yr in yearEntries) {
                const text = yearEntries[yr];
                if (text && text.toLowerCase().includes(query)) {
                    matches.push({ month, day, year: parseInt(yr), text });
                }
            }
        }

        matches.sort((a, b) => b.year - a.year || a.month - b.month || a.day - b.day);

        if (matches.length === 0) {
            resultsEl.innerHTML = '<div class="search-empty">No entries found.</div>';
            return;
        }

        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        matches.forEach(({ month, day, year, text }) => {
            const div = document.createElement('div');
            div.className = 'search-result';

            const dateEl = document.createElement('div');
            dateEl.className = 'search-result-date';
            dateEl.textContent = `${monthName(month)} ${day}, ${year}`;

            const textEl = document.createElement('div');
            textEl.className = 'search-result-text';
            textEl.innerHTML = text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);

            div.appendChild(dateEl);
            div.appendChild(textEl);
            div.addEventListener('click', () => {
                viewMonth = month;
                viewDay = day;
                render();
                closeSearch();
            });
            resultsEl.appendChild(div);
        });
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeSearch(); return; }
        if (document.getElementById('searchOverlay').classList.contains('open')) return;
        if (document.activeElement && document.activeElement.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'ArrowRight') navigate(1);
    });

    // Init
    const today = new Date();
    viewMonth = today.getMonth();
    viewDay = today.getDate();
    initAuth();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
</script>
</body>
</html>
